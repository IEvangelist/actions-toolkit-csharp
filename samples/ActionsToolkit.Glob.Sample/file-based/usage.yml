#
# Workflow snippet showing how to call a file-based ActionsToolkit.Glob
# script from a GitHub Actions `run:` step. Drop this into
# .github/workflows/<your-workflow>.yml.

name: actions-toolkit-sharp-glob-file-based

on:
  workflow_dispatch:
  pull_request:

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: List C# files via glob
        shell: bash
        env:
          INPUT_FILES: '**/*.cs'
        run: |
          dotnet run \
            samples/ActionsToolkit.Glob.Sample/file-based/glob-with-input.cs
