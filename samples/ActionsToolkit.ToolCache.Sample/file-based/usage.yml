#
# Workflow snippet showing how to call file-based ActionsToolkit.ToolCache
# scripts from a GitHub Actions `run:` step. Drop this into
# .github/workflows/<your-workflow>.yml.

name: actions-toolkit-sharp-toolcache-file-based

on:
  workflow_dispatch:
  pull_request:

jobs:
  tool-cache-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve a semver range
        shell: bash
        run: |
          dotnet run \
            samples/ActionsToolkit.ToolCache.Sample/file-based/evaluate-versions.cs

      - name: Find a cached tool version
        shell: bash
        env:
          RUNNER_TOOL_CACHE: ${{ runner.tool_cache }}
        run: |
          dotnet run \
            samples/ActionsToolkit.ToolCache.Sample/file-based/find.cs

      - name: Match against a versions manifest
        shell: bash
        run: |
          dotnet run \
            samples/ActionsToolkit.ToolCache.Sample/file-based/manifest.cs

      - name: Download / extract / cache an artifact
        shell: bash
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          RUNNER_TOOL_CACHE: ${{ runner.tool_cache }}
        run: |
          dotnet run \
            samples/ActionsToolkit.ToolCache.Sample/file-based/download-and-cache.cs
