name: "Build"
description: "A build GitHub Action composite shared workflow."

inputs:
  upload-artifacts:
    description: "Whether to upload artifacts"
    required: true
    default: "true"
  run-tests:
    description: "Whether to runs tests"
    required: true
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        global-json-file: global.json

    - name: Install dependencies
      shell: bash
      run: dotnet restore

    - name: Build
      shell: bash
      # `-m:1` (single MSBuild worker) avoids a Windows-only file-lock race
      # where multiple parallel workers all try to write the same shared
      # `*.runtimeconfig.json` for an AotConsumer project that is
      # `<ProjectReference>`d by several `*.Aot.Tests.csproj` parents. The
      # contention only surfaces under Windows Defender's AV scan window
      # but is deterministic enough to fail consistently in CI; see PR #49.
      run: dotnet build --configuration Release --no-restore -m:1

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: inputs.upload-artifacts == 'true'
      with:
        name: nuget
        path: artifacts/package/release/*.nupkg

    - name: Test
      if: inputs.run-tests == 'true'
      shell: bash
      run: dotnet test --configuration Release --no-restore --no-build --filter "Category!=RequiresEnvVar"
