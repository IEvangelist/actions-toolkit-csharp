name: build-and-test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
    inputs:
      reason:
        description: 'The reason for running a build?'
        required: true
        default: 'Manual build'

permissions:
  contents: read

jobs:
  verify-test-projects:
    name: verify-test-projects
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          filter: tree:0

      - name: Verify all test projects are registered in ActionsToolkit.slnx
        shell: bash
        run: |
          set -euo pipefail

          # ActionsToolkit.slnx is the source of truth for the test
          # projects executed by `dotnet test`. Any test project on disk
          # under tests/ActionsToolkit.*.Tests/ that is not in the
          # solution would be silently skipped by CI, so fail fast here.
          # This covers both managed (*.Tests) and NativeAOT (*.Aot.Tests)
          # test projects, so adding a new package's test project does not
          # require editing this workflow -- only `dotnet sln add` is needed.

          missing=0
          found=0
          while IFS= read -r proj; do
            found=$((found + 1))
            name=$(basename "$proj")
            if ! grep -Fq "$name" ActionsToolkit.slnx; then
              echo "::error file=$proj::Test project '$name' is not registered in ActionsToolkit.slnx. Run: dotnet sln add \"$proj\""
              missing=$((missing + 1))
            fi
          done < <(find tests -type f -name 'ActionsToolkit.*.Tests.csproj' | sort)

          if [ "$found" -eq 0 ]; then
            echo "::error::No test projects found under tests/ActionsToolkit.*.Tests/. The discovery glob may be broken."
            exit 1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::$missing test project(s) on disk are missing from ActionsToolkit.slnx. See tests/README.md for the convention."
            exit 1
          fi

          echo "All $found test project(s) under tests/ActionsToolkit.*.Tests/ are registered in ActionsToolkit.slnx."

  build:
    name: build-${{matrix.os}}
    needs: verify-test-projects
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          filter: tree:0

      - name: 'Print manual build reason'
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo 'Reason: ${{ github.event.inputs.reason }}'

      - name: Build
        uses: ./.github/actions/build
        with:
          upload-artifacts: ${{ matrix.os == 'ubuntu-latest' }}

  test-samples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Build
        run: |
          docker build -f samples/ActionsToolkit.Core.Sample/Dockerfile . -t actions-toolkit-sharp-core-sample:latest
          docker build -f samples/ActionsToolkit.Glob.Sample/Dockerfile . -t actions-toolkit-sharp-glob-sample:latest

      - uses: ./samples/ActionsToolkit.Core.Sample

      - uses: ./samples/ActionsToolkit.Glob.Sample
        with:
          files: "**/*.cs"
